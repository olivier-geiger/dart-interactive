function App() {
  const [sel,setSel]=useState(null);
  const [cache,setCache]=useState({});
  const [codes,setCodes]=useState({});
  const [fb,setFb]=useState(null);
  const [genBusy,setGenBusy]=useState(false);
  const [chkBusy,setChkBusy]=useState(false);
  const [done,setDone]=useState(new Set());
  const [openMods,setOpenMods]=useState(new Set([1]));
  const [hintN,setHintN]=useState(0);
  const [showHint,setShowHint]=useState(false);
  const [genErr,setGenErr]=useState(false);

  const curCode=sel?(codes[sel.id]??''):'';
  const setCurCode=v=>{if(sel)setCodes(p=>({...p,[sel.id]:v}));};

  async function apiCall(sys,msg){
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:msg}]})
    });
    const d=await r.json();
    const txt=d.content?.find(b=>b.type==='text')?.text??'{}';
    return JSON.parse(txt.replace(/```json\n?|```\n?/g,'').trim());
  }

  async function pick(ex){
    setSel(ex);setFb(null);setShowHint(false);setHintN(0);setGenErr(false);
    if(cache[ex.id]){
      if(!codes[ex.id])setCodes(p=>({...p,[ex.id]:cache[ex.id].starterCode}));
      return;
    }
    setGenBusy(true);
    try{
      const mod=MODS.find(m=>m.id===ex.mod);
      const diff=ex.mod<=2?'débutant':ex.mod<=4?'intermédiaire':ex.mod<=5?'avancé':'expert';
      const data=await apiCall(
        'Tu es un instructeur expert Dart 3. Génère du contenu pédagogique en français. Réponds UNIQUEMENT avec du JSON valide, sans markdown ni backticks.',
        `Exercice #${ex.id}/100: "${ex.t}" | Module: ${mod.n} | Concepts: ${ex.k.join(', ')} | Difficulté: ${diff}
JSON:{"description":"2-3 phrases sur l'exercice","objectives":["Objectif 1","Objectif 2","Objectif 3"],"starterCode":"// Exercice ${ex.id}: ${ex.t}\\nvoid main() {\\n  // TODO: votre code ici\\n}","hints":["Indice général","Indice précis","Quasi-solution"],"difficulty":"${diff}"}`
      );
      setCache(p=>({...p,[ex.id]:data}));
      setCodes(p=>({...p,[ex.id]:p[ex.id]??data.starterCode}));
    }catch(e){setGenErr(true);}
    setGenBusy(false);
  }

  async function check(){
    if(!sel||!curCode.trim()||!cache[sel.id]||chkBusy)return;
    setChkBusy(true);setFb(null);
    try{
      const c=cache[sel.id];
      const res=await apiCall(
        'Tu es un correcteur expert Dart bienveillant. Réponds UNIQUEMENT avec du JSON valide, sans markdown ni backticks.',
        `Exercice #${sel.id}: "${sel.t}" | Objectifs: ${c.objectives?.join(' | ')}
Code:\`\`\`dart\n${curCode}\n\`\`\`
JSON:{"passed":true,"score":85,"summary":"1 phrase","positives":["bien 1","bien 2"],"improvements":["améliorer 1"],"tip":"conseil pro"}`
      );
      setFb(res);
      if(res.passed)setDone(p=>new Set([...p,sel.id]));
    }catch(e){}
    setChkBusy(false);
  }

  const selIdx=EXS.findIndex(e=>e.id===sel?.id);
  const prevEx=selIdx>0?EXS[selIdx-1]:null;
  const nextEx=selIdx<EXS.length-1?EXS[selIdx+1]:null;

  return (
    <div style={{display:'flex',height:'100vh',background:C.bg,color:C.tx,overflow:'hidden'}}>

      {/* SIDEBAR */}
      <aside style={{width:260,background:C.s1,borderRight:`1px solid ${C.bdr}`,display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
        {/* Logo */}
        <div style={{padding:'.8rem 1rem',borderBottom:`1px solid ${C.bdr}`,display:'flex',alignItems:'center',gap:'.5rem'}}>
          <div style={{width:28,height:28,background:`linear-gradient(135deg,${C.pr},${C.ac})`,borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:'#000',fontSize:'.75rem'}}>D</div>
          <span style={{fontWeight:700,fontSize:'.875rem'}}>Dart<span style={{color:C.pr}}>Master</span></span>
          <span style={{marginLeft:'auto',fontFamily:"'JetBrains Mono',monospace",fontSize:'.68rem',color:C.pr,background:C.prD,padding:'.12rem .45rem',borderRadius:4}}>{done.size}/100</span>
        </div>
        {/* Progress */}
        <div style={{padding:'.45rem 1rem .55rem',borderBottom:`1px solid ${C.bdr}`}}>
          <div style={{height:3,background:C.bdr,borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${done.size}%`,background:`linear-gradient(90deg,${C.pr},${C.ac})`,borderRadius:2,transition:'.4s'}}/>
          </div>
        </div>
        {/* Modules */}
        <div style={{flex:1,overflowY:'auto',padding:'.375rem .4rem'}}>
          {MODS.map(mod=>{
            const mExs=EXS.filter(e=>e.mod===mod.id);
            const open=openMods.has(mod.id);
            const mDone=mExs.filter(e=>done.has(e.id)).length;
            return (
              <div key={mod.id} style={{marginBottom:'.15rem'}}>
                <button onClick={()=>setOpenMods(p=>{const n=new Set(p);n.has(mod.id)?n.delete(mod.id):n.add(mod.id);return n;})}
                  style={{width:'100%',display:'flex',alignItems:'center',gap:'.45rem',padding:'.48rem .6rem',background:open?C.prD:'transparent',border:`1px solid ${open?C.bdrB:'transparent'}`,borderRadius:8,color:open?C.tx:C.tx2,cursor:'pointer',fontFamily:"'Outfit',sans-serif",fontSize:'.76rem',fontWeight:600,transition:'.2s'}}>
                  <span>{mod.ico}</span>
                  <span style={{flex:1,textAlign:'left',fontSize:'.74rem'}}>{mod.n}</span>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'.6rem',color:mod.c}}>{mDone}/{mExs.length}</span>
                  <span style={{color:C.tx3,display:'inline-block',transform:open?'rotate(180deg)':'none',transition:'.2s',fontSize:'.65rem'}}>▾</span>
                </button>
                {open&&(
                  <div style={{paddingLeft:'.3rem',marginTop:'.1rem'}}>
                    {mExs.map(ex=>{
                      const isSel=sel?.id===ex.id;
                      const isDone=done.has(ex.id);
                      return(
                        <button key={ex.id} onClick={()=>pick(ex)}
                          style={{width:'100%',display:'flex',alignItems:'center',gap:'.375rem',padding:'.35rem .575rem',background:isSel?C.prD:'transparent',border:`1px solid ${isSel?C.bdrB:'transparent'}`,borderRadius:6,color:isSel?C.tx:C.tx2,cursor:'pointer',fontFamily:"'Outfit',sans-serif",fontSize:'.7rem',marginBottom:'.08rem',transition:'.15s',textAlign:'left'}}>
                          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'.58rem',color:isDone?C.ok:isSel?C.pr:C.tx3,minWidth:'1.6rem',flexShrink:0}}>{isDone?'✓':`#${String(ex.id).padStart(2,'0')}`}</span>
                          <span style={{flex:1,lineHeight:1.3}}>{ex.t}</span>
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </aside>

      {/* MAIN */}
      <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {!sel
          ?<Welcome onStart={()=>pick(EXS[0])} done={done.size}/>
          :genBusy?<Loader msg="Génération de l'exercice par IA…"/>
          :genErr?<ErrState onRetry={()=>pick(sel)}/>
          :<ExView
              key={sel.id}
              ex={sel} content={cache[sel.id]} code={curCode} setCode={setCurCode}
              feedback={fb} chkBusy={chkBusy} onCheck={check} done={done}
              showHint={showHint} hintN={hintN}
              onHint={()=>{setShowHint(true);setHintN(n=>Math.min(n+1,(cache[sel.id]?.hints?.length??3)-1));}}
              onPrev={prevEx?()=>pick(prevEx):null}
              onNext={nextEx?()=>pick(nextEx):null}
            />
        }
      </main>
    </div>
  );
}

function Welcome({onStart,done}){
  return(
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem',height:'100%'}}>
      <div style={{textAlign:'center',maxWidth:500}}>
        <div style={{fontSize:'3.5rem',marginBottom:'1rem'}}>🎯</div>
        <h1 style={{fontFamily:"'Outfit',sans-serif",fontSize:'2.1rem',fontWeight:800,lineHeight:1.1,marginBottom:1}}>
          Apprenez Dart<br/>
          <span style={{background:`linear-gradient(90deg,${C.pr},${C.ac})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>exercice par exercice</span>
        </h1>
        <p style={{color:C.tx2,fontSize:'.92rem',lineHeight:1.75,marginBottom:'2rem',marginTop:'1rem'}}>
          Cliquez sur un exercice dans la sidebar, codez votre solution, et obtenez une correction instantanée par IA avec score, feedback et indices.
        </p>
        <button onClick={onStart}
          style={{background:`linear-gradient(135deg,${C.pr},#38BDF8)`,color:'#000',border:'none',borderRadius:10,padding:'.875rem 2.25rem',fontFamily:"'Outfit',sans-serif",fontWeight:700,fontSize:'1rem',cursor:'pointer'}}>
          Commencer — Exercice #01 →
        </button>
        <div style={{display:'flex',gap:'2rem',justifyContent:'center',marginTop:'2.5rem'}}>
          {[['100','Exercices'],['6','Modules'],['IA','Correction'],['∞','Indices']].map(([v,l])=>(
            <div key={l}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'1.4rem',fontWeight:600,color:C.pr}}>{v}</div>
              <div style={{fontSize:'.65rem',color:C.tx3,textTransform:'uppercase',letterSpacing:'.06em'}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Loader({msg}){
  return(
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'1rem',height:'100%'}}>
      <div style={{width:36,height:36,border:`3px solid ${C.bdr}`,borderTopColor:C.pr,borderRadius:'50%',animation:'spin .9s linear infinite'}}/>
      <p style={{color:C.tx2,fontFamily:"'JetBrains Mono',monospace",fontSize:'.8rem'}}>{msg}</p>
    </div>
  );
}

function ErrState({onRetry}){
  return(
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'1rem',height:'100%'}}>
      <p style={{color:C.tx2}}>⚠️ Erreur de génération.</p>
      <button onClick={onRetry} style={{background:C.prD,border:`1px solid ${C.bdrB}`,color:C.pr,padding:'.6rem 1.5rem',borderRadius:8,cursor:'pointer',fontFamily:"'Outfit',sans-serif",fontWeight:600}}>Réessayer</button>
    </div>
  );
}

function ExView({ex,content,code,setCode,feedback,chkBusy,onCheck,done,showHint,hintN,onHint,onPrev,onNext}){
  if(!content)return<Loader msg="Chargement…"/>;
  const isDone=done.has(ex.id);
  const mod=MODS.find(m=>m.id===ex.mod);
  const diffC={débutant:C.pr,intermédiaire:C.ac,avancé:C.ok,expert:C.ye}[content.difficulty]??C.pr;

  return(
    <div className="fade" style={{flex:1,overflowY:'auto',padding:'1.5rem 1.875rem 3rem'}}>

      {/* Header */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'1.25rem',gap:'1rem'}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:'.45rem',marginBottom:'.45rem',flexWrap:'wrap'}}>
            <Pill c={mod.c}>{mod.ico} {mod.n}</Pill>
            <Pill c={diffC}>{content.difficulty}</Pill>
            {isDone&&<Pill c={C.ok}>✓ Complété</Pill>}
          </div>
          <h1 style={{fontFamily:"'Outfit',sans-serif",fontSize:'1.4rem',fontWeight:800,lineHeight:1.2,margin:0}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.pr,fontSize:'.95rem',marginRight:'.45rem'}}>#{String(ex.id).padStart(2,'0')}</span>
            {ex.t}
          </h1>
        </div>
        <div style={{display:'flex',gap:'.4rem',flexShrink:0}}>
          {onPrev&&<NBtn onClick={onPrev}>← Préc.</NBtn>}
          {onNext&&<NBtn onClick={onNext}>Suiv. →</NBtn>}
        </div>
      </div>

      {/* Description */}
      <div style={{background:C.s2,border:`1px solid ${C.bdr}`,borderRadius:12,padding:'1.125rem',marginBottom:'1rem'}}>
        <p style={{color:C.tx2,lineHeight:1.75,marginBottom:content.objectives?.length?'.875rem':0,fontSize:'.885rem',margin:0}}>{content.description}</p>
        {content.objectives?.length>0&&(
          <div style={{marginTop:'.875rem'}}>
            <div style={{fontSize:'.65rem',fontWeight:700,color:C.tx3,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'.45rem'}}>Objectifs</div>
            {content.objectives.map((o,i)=>(
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:'.45rem',marginBottom:'.3rem'}}>
                <span style={{color:C.pr,fontSize:'.78rem',flexShrink:0,marginTop:'.1rem'}}>◆</span>
                <span style={{color:C.tx2,fontSize:'.845rem',lineHeight:1.5}}>{o}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Editor */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.375rem'}}>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'.65rem',color:C.tx3}}>exercice_{String(ex.id).padStart(2,'0')}.dart</span>
        <button onClick={()=>setCode(content.starterCode)} style={{background:'transparent',border:`1px solid ${C.bdr}`,color:C.tx3,padding:'.16rem .5rem',borderRadius:5,cursor:'pointer',fontSize:'.67rem',fontFamily:"'Outfit',sans-serif"}}>↺ Reset</button>
      </div>
      <CodeEditor code={code} onChange={setCode}/>

      {/* Buttons */}
      <div style={{display:'flex',gap:'.625rem',marginTop:'.8rem',marginBottom:'.875rem',flexWrap:'wrap'}}>
        <button onClick={onCheck} disabled={chkBusy||!code.trim()}
          style={{background:chkBusy?'rgba(14,165,233,.2)':`linear-gradient(135deg,${C.pr},#38BDF8)`,color:'#000',border:'none',borderRadius:10,padding:'.675rem 1.5rem',fontFamily:"'Outfit',sans-serif",fontWeight:700,fontSize:'.875rem',cursor:chkBusy||!code.trim()?'not-allowed':'pointer',opacity:!code.trim()?.5:1,display:'flex',alignItems:'center',gap:'.375rem',minWidth:185,justifyContent:'center'}}>
          {chkBusy?<><SpinIcon/>Correction…</>:<>✓ Vérifier mon code</>}
        </button>
        <button onClick={onHint}
          style={{background:'transparent',border:`1px solid ${C.bdrB}`,color:C.pr,borderRadius:10,padding:'.675rem 1.125rem',fontFamily:"'Outfit',sans-serif",fontWeight:600,fontSize:'.855rem',cursor:'pointer'}}>
          💡 Indice{showHint&&content.hints?` (${hintN+1}/${content.hints.length})`:''}
        </button>
      </div>

      {/* Hint */}
      {showHint&&content.hints&&(
        <div style={{background:'rgba(14,165,233,.07)',border:'1px solid rgba(14,165,233,.2)',borderRadius:10,padding:'.925rem 1.1rem',marginBottom:'.875rem'}}>
          <div style={{fontSize:'.63rem',color:C.pr,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'.35rem'}}>💡 Indice {hintN+1}</div>
          <p style={{color:C.tx2,fontSize:'.855rem',lineHeight:1.65,margin:0}}>{content.hints[hintN]}</p>
        </div>
      )}

      {/* Feedback */}
      {feedback&&<FeedbackCard feedback={feedback} onNext={onNext}/>}

      {/* Tags */}
      <div style={{marginTop:'1.375rem',paddingTop:'.875rem',borderTop:`1px solid ${C.bdr}`}}>
        <div style={{fontSize:'.62rem',color:C.tx3,textTransform:'uppercase',letterSpacing:'.09em',marginBottom:'.45rem'}}>Concepts couverts</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'.28rem'}}>
          {ex.k.map(k=><span key={k} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'.6rem',padding:'.14rem .44rem',borderRadius:4,background:'rgba(255,255,255,.04)',color:C.tx2,border:`1px solid ${C.bdr}`}}>{k}</span>)}
        </div>
      </div>
    </div>
  );
}

function CodeEditor({code,onChange}){
  const taRef=useRef(null);
  const lnRef=useRef(null);
  const lines=(code||'').split('\n').length;

  function handleKey(e){
    if(e.key==='Tab'){
      e.preventDefault();
      const s=e.target.selectionStart,en=e.target.selectionEnd;
      const nv=(code||'').slice(0,s)+'  '+(code||'').slice(en);
      onChange(nv);
      requestAnimationFrame(()=>{if(taRef.current){taRef.current.selectionStart=taRef.current.selectionEnd=s+2;}});
    }
  }
  function sync(){if(lnRef.current&&taRef.current)lnRef.current.scrollTop=taRef.current.scrollTop;}

  return(
    <div style={{display:'flex',background:C.code,borderRadius:12,border:`1px solid ${C.bdr}`,overflow:'hidden',minHeight:280}}>
      <div ref={lnRef} style={{padding:'.875rem .7rem',color:C.tx3,fontFamily:"'JetBrains Mono',monospace",fontSize:12.5,lineHeight:'1.74',textAlign:'right',userSelect:'none',overflowY:'hidden',borderRight:`1px solid ${C.bdr}`,minWidth:'2.4rem',whiteSpace:'pre',flexShrink:0}}>
        {Array.from({length:lines},(_,i)=>i+1).join('\n')}
      </div>
      <textarea ref={taRef} value={code||''} onChange={e=>onChange(e.target.value)} onKeyDown={handleKey} onScroll={sync}
        spellCheck={false} autoComplete="off" autoCorrect="off"
        style={{flex:1,background:'transparent',color:C.tx,border:'none',outline:'none',padding:'.875rem',fontFamily:"'JetBrains Mono',monospace",fontSize:12.5,lineHeight:'1.74',resize:'none',minHeight:280,tabSize:2}}/>
    </div>
  );
}

function FeedbackCard({feedback,onNext}){
  const pass=feedback?.passed;
  const score=feedback?.score??0;
  const col=pass?C.ok:C.ac;
  const bg=pass?'rgba(16,185,129,':'rgba(249,115,22,';
  return(
    <div className="fade" style={{background:`${bg}.07)`,border:`1px solid ${bg}.28)`,borderRadius:12,padding:'1.125rem',marginBottom:'.625rem'}}>
      <div style={{display:'flex',alignItems:'center',gap:'.8rem',marginBottom:'.875rem'}}>
        <div style={{width:48,height:48,borderRadius:'50%',background:`${bg}.14)`,border:`2px solid ${bg}.45)`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:'.95rem',color:col}}>{score}</span>
        </div>
        <div>
          <div style={{fontWeight:700,color:col,fontSize:'.925rem',marginBottom:'.18rem'}}>{pass?'✅ Exercice réussi !':'⚠️ Pas encore...'}</div>
          <div style={{color:C.tx2,fontSize:'.845rem'}}>{feedback.summary}</div>
        </div>
      </div>
      {feedback.positives?.length>0&&(
        <div style={{marginBottom:'.625rem'}}>
          <div style={{color:C.ok,fontSize:'.62rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.09em',marginBottom:'.3rem'}}>Points forts</div>
          {feedback.positives.map((p,i)=><div key={i} style={{color:C.tx2,fontSize:'.84rem',display:'flex',gap:'.45rem',marginBottom:'.22rem'}}><span style={{color:C.ok,flexShrink:0}}>+</span>{p}</div>)}
        </div>
      )}
      {feedback.improvements?.length>0&&(
        <div style={{marginBottom:'.625rem'}}>
          <div style={{color:C.ac,fontSize:'.62rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.09em',marginBottom:'.3rem'}}>À améliorer</div>
          {feedback.improvements.map((p,i)=><div key={i} style={{color:C.tx2,fontSize:'.84rem',display:'flex',gap:'.45rem',marginBottom:'.22rem'}}><span style={{color:C.ac,flexShrink:0}}>→</span>{p}</div>)}
        </div>
      )}
      {feedback.tip&&(
        <div style={{padding:'.7rem',background:'rgba(14,165,233,.08)',borderRadius:8,fontSize:'.84rem',color:C.tx2,display:'flex',gap:'.45rem',alignItems:'flex-start',marginBottom:pass&&onNext?'.75rem':0}}>
          <span style={{color:C.pr,flexShrink:0}}>💡</span><span>{feedback.tip}</span>
        </div>
      )}
      {pass&&onNext&&(
        <button onClick={onNext} style={{background:`linear-gradient(135deg,${C.ok},#34D399)`,color:'#000',border:'none',borderRadius:9,padding:'.625rem 1.5rem',fontFamily:"'Outfit',sans-serif",fontWeight:700,fontSize:'.875rem',cursor:'pointer',width:'100%',display:'block',marginTop:feedback.tip?0:'.75rem'}}>
          Exercice suivant →
        </button>
      )}
    </div>
  );
}

const Pill=({c,children})=><span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'.63rem',color:c,background:`${c}18`,border:`1px solid ${c}35`,padding:'.16rem .48rem',borderRadius:100,whiteSpace:'nowrap'}}>{children}</span>;
const NBtn=({onClick,children})=><button onClick={onClick} style={{background:'transparent',border:`1px solid ${C.bdr}`,color:C.tx2,padding:'.38rem .75rem',borderRadius:7,cursor:'pointer',fontSize:'.75rem',fontFamily:"'Outfit',sans-serif",whiteSpace:'nowrap'}}>{children}</button>;
const SpinIcon=()=><span style={{width:13,height:13,border:'2px solid rgba(0,0,0,.2)',borderTopColor:'#000',borderRadius:'50%',display:'inline-block',animation:'spin2 .7s linear infinite'}}/>;

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
